<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta-name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BroadwayStream</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- BANNER -->
  <div class="banner">
    <div class="banner-content">
      <h1>BroadwayStream</h1>
      <h2>Your Home for Musicals, Anytime</h2>
      <p class="description">
        Stream iconic Broadway shows, filmed performances, and musical theatre classics from the comfort of your home.
      </p>
      <a href="#musicals" class="btn-blue">Start Watching</a>
    </div>
  </div>

  <!-- CARDS GRID -->
  <div class="container" id="musicals">

    <div class="cards">

      <div class="card">
        <img src="file:///Users/alexandredecroix/Desktop/startup-site/image/Hamilton.jpeg" alt="Hamilton">
        <h3>Hamilton</h3>
      </div>

      <div class="card">
        <img src="file:///Users/alexandredecroix/Desktop/startup-site/image/Phantom.jpeg" alt="The Phantom of the Opera">
        <h3>The Phantom of the Opera</h3>
      </div>

      <div class="card">
        <img src="file:///Users/alexandredecroix/Desktop/startup-site/image/Miserable.jpeg" alt="Les Misérables">
        <h3>Les Misérables</h3>
      </div>

    </div>

  </div>

</body>
</html>
